name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: windows-latest
    strategy:
      fail-fast: false    # keeps running even if one test fails
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v5
      with:
        node-version: lts/*
        cache: npm          # cache npm packages (faster installs)
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      #run: npx playwright test tests/website/Services/service.spec.js --project=chromium
      run: npx playwright test tests/website/Services/service.spec.js --project=chromium --workers=6
      
    - uses: actions/upload-artifact@v4
      #if: ${{ !cancelled() }}
      if: always()  # always upload report even if tests fail
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
